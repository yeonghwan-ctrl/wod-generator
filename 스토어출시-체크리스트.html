<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Linkup · 스토어 출시 체크리스트</title>
    <style>
      :root {
        --brand: #5ea2ff;
        --brand-deep: #2f6fd6;
        --bg: #161a22;
        --surface: #1f2430;
        --surface-2: #2a3040;
        --border: #3a4252;
        --text: #f3f6fb;
        --muted: #aab4c6;
        --green: #2fc27e;
        --amber: #f0a23a;
        --red: #ff6a4d;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: 'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont,
          'Segoe UI', Roboto, 'Noto Sans KR', sans-serif;
        background: var(--bg);
        background-image: radial-gradient(900px 600px at 50% -260px, rgba(94, 162, 255, 0.14), transparent 70%);
        color: var(--text);
        line-height: 1.55;
        padding: 0 0 80px;
      }
      .wrap { max-width: 820px; margin: 0 auto; padding: 28px 18px; }
      header.hero { text-align: center; padding: 18px 0 8px; }
      .logo {
        display: inline-flex; align-items: center; gap: 10px;
        font-size: 1.9rem; font-weight: 900; letter-spacing: -0.5px;
      }
      .logo .dot {
        width: 38px; height: 38px; border-radius: 11px;
        background: linear-gradient(135deg, #5ea2ff 0%, #2f6fd6 100%);
        display: grid; place-items: center; font-size: 1.1rem;
      }
      .sub { color: var(--muted); margin-top: 6px; font-size: 0.95rem; }
      /* progress */
      .progress-card {
        background: var(--surface); border: 1px solid var(--border);
        border-radius: 16px; padding: 18px 20px; margin: 22px 0 28px;
        box-shadow: 0 16px 38px rgba(0, 0, 0, 0.4);
      }
      .progress-top { display: flex; justify-content: space-between; align-items: baseline; }
      .progress-top b { font-size: 1.1rem; }
      .progress-top span { color: var(--muted); font-size: 0.9rem; }
      .bar { height: 12px; background: var(--surface-2); border-radius: 99px; overflow: hidden; margin-top: 12px; }
      .bar > div {
        height: 100%; width: 0; border-radius: 99px;
        background: linear-gradient(90deg, #5ea2ff, #2f6fd6);
        transition: width 0.35s ease;
      }
      /* sections */
      section { margin-bottom: 26px; }
      h2 {
        font-size: 1.15rem; margin: 0 0 12px; display: flex; align-items: center; gap: 9px;
      }
      h2 .num {
        width: 26px; height: 26px; border-radius: 8px; background: var(--surface-2);
        border: 1px solid var(--border); display: grid; place-items: center;
        font-size: 0.8rem; color: var(--brand); flex: none;
      }
      ul.items { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 10px; }
      li.item {
        background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
        padding: 13px 15px; display: flex; gap: 12px; align-items: flex-start;
        transition: border-color 0.15s ease, background 0.15s ease;
      }
      li.item:hover { border-color: #4a5468; }
      li.item.checked { opacity: 0.62; }
      li.item.checked .label { text-decoration: line-through; }
      .cb {
        flex: none; width: 22px; height: 22px; margin-top: 1px; cursor: pointer;
        appearance: none; -webkit-appearance: none;
        border: 2px solid var(--border); border-radius: 6px; background: var(--surface-2);
        position: relative; transition: background 0.15s ease, border-color 0.15s ease;
      }
      .cb:checked { background: linear-gradient(135deg, #5ea2ff, #2f6fd6); border-color: transparent; }
      .cb:checked::after {
        content: '✓'; position: absolute; inset: 0; display: grid; place-items: center;
        color: #fff; font-size: 0.85rem; font-weight: 900;
      }
      .body { min-width: 0; }
      .label { font-weight: 700; font-size: 0.97rem; }
      .note { color: var(--muted); font-size: 0.84rem; margin-top: 3px; }
      .note code {
        background: var(--surface-2); border: 1px solid var(--border); border-radius: 5px;
        padding: 1px 6px; font-size: 0.82em;
      }
      .tags { margin-top: 7px; display: flex; flex-wrap: wrap; gap: 6px; }
      .tag {
        font-size: 0.68rem; font-weight: 800; padding: 3px 8px; border-radius: 99px;
        letter-spacing: 0.2px;
      }
      .tag.done { background: rgba(47, 194, 126, 0.16); color: var(--green); }
      .tag.me { background: rgba(240, 162, 58, 0.16); color: var(--amber); }
      .tag.code { background: rgba(94, 162, 255, 0.16); color: var(--brand); }
      .tag.pay { background: rgba(255, 106, 77, 0.16); color: var(--red); }
      .legend { display: flex; flex-wrap: wrap; gap: 10px; margin: 8px 0 20px; font-size: 0.8rem; color: var(--muted); }
      .legend .tag { font-size: 0.66rem; }
      footer { text-align: center; color: var(--muted); font-size: 0.8rem; margin-top: 30px; }
      .reset { background: none; border: 1px solid var(--border); color: var(--muted);
        border-radius: 8px; padding: 6px 12px; font-size: 0.78rem; cursor: pointer; margin-top: 12px; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <header class="hero">
        <div class="logo"><span class="dot">🏋️</span> Linkup</div>
        <div class="sub">Play Store · App Store 출시 준비 체크리스트</div>
      </header>

      <div class="progress-card">
        <div class="progress-top">
          <b id="pct">0%</b>
          <span><span id="doneN">0</span> / <span id="totalN">0</span> 완료</span>
        </div>
        <div class="bar"><div id="barFill"></div></div>
        <button class="reset" onclick="resetChecks()">체크 초기화</button>
      </div>

      <div class="legend">
        <span class="tag code">코드</span> 앱 코드로 처리
        <span class="tag done">완료</span> 이번에 반영됨
        <span class="tag me">내가 할 일</span> 계정·결제·디자인 등 직접
        <span class="tag pay">결제</span> Pro 도입 시
      </div>

      <!-- 0 -->
      <section>
        <h2><span class="num">0</span> 방향 결정</h2>
        <ul class="items" data-section="dir"></ul>
      </section>
      <!-- 1 -->
      <section>
        <h2><span class="num">1</span> 계정 · 비용</h2>
        <ul class="items" data-section="acct"></ul>
      </section>
      <!-- 2 -->
      <section>
        <h2><span class="num">2</span> 기술 준비 (코드)</h2>
        <ul class="items" data-section="tech"></ul>
      </section>
      <!-- 3 -->
      <section>
        <h2><span class="num">3</span> 스토어 등록 자산</h2>
        <ul class="items" data-section="assets"></ul>
      </section>
      <!-- 4 -->
      <section>
        <h2><span class="num">4</span> 정책 · 심사</h2>
        <ul class="items" data-section="policy"></ul>
      </section>
      <!-- 5 -->
      <section>
        <h2><span class="num">5</span> 결제 (Pro 도입 시 · 선택)</h2>
        <ul class="items" data-section="pay"></ul>
      </section>

      <footer>이 체크 상태는 이 브라우저에만 저장됩니다 · Linkup</footer>
    </div>

    <script>
      // id, 라벨, 노트(HTML 허용), 태그들, 기본완료여부
      const DATA = {
        dir: [
          ['dir-cap', 'Capacitor 기반으로 결정 (iOS+Android 둘 다)', '웹 코드를 네이티브로 감싸는 방식. TWA는 안드로이드만 가능.', ['code', 'done'], true],
        ],
        acct: [
          ['acct-apple', 'Apple Developer Program 가입 ($99/년)', '', ['me'], false],
          ['acct-google', 'Google Play Console 가입 ($25 1회)', '', ['me'], false],
          ['acct-mac', 'iOS 빌드 환경 확보 (Mac+Xcode 또는 클라우드 빌드)', 'Mac 없으면 Codemagic/EAS 등 클라우드 빌드 사용', ['me'], false],
        ],
        tech: [
          ['tech-capset', 'Capacitor 설정 파일 추가 (capacitor.config.json)', 'appId <code>com.linkup.app</code>, webDir <code>dist</code>', ['code', 'done'], true],
          ['tech-capinstall', 'Capacitor 설치 & 플랫폼 추가', '<code>npm i @capacitor/core @capacitor/cli @capacitor/android @capacitor/ios</code> → <code>npx cap add android</code> / <code>ios</code>', ['me'], false],
          ['tech-login', '구글 로그인 네이티브 방식으로 교체', '⚠️ <code>signInWithPopup</code>은 웹뷰에서 동작 안 함 → <code>@capacitor-firebase/authentication</code> 사용', ['code', 'me'], false],
          ['tech-delete', '앱 내 계정 삭제 기능', '헤더 계정 메뉴 → 계정 삭제 (클라우드+로컬 데이터 영구 삭제)', ['code', 'done'], true],
          ['tech-manifest', 'PWA manifest 보강 (scope/lang/orientation/categories)', '', ['code', 'done'], true],
          ['tech-icons', '아이콘/스플래시 생성', '<code>@capacitor/assets</code>로 1024px 소스 1장에서 일괄 생성 (adaptive/maskable 포함)', ['me'], false],
          ['tech-offline', '오프라인 동작 점검', 'Apple은 네트워크 끊겨도 최소 동작 확인 — PWA라 유리', ['me'], false],
        ],
        assets: [
          ['as-privacy', '개인정보처리방침 페이지', '<code>/privacy.html</code> 작성·배포 완료 → 스토어 등록 시 URL 입력', ['code', 'done'], true],
          ['as-screens', '스크린샷 (기기 규격별)', 'iOS 6.7"/6.5" 등 규격 엄격, Android 폰/태블릿', ['me'], false],
          ['as-desc', '앱 이름/설명/키워드 (한국어+영어)', '', ['me'], false],
          ['as-rating', '연령등급 설문 · 카테고리(건강·피트니스)', '', ['me'], false],
          ['as-safety', 'Play 데이터 보안 / Apple App Privacy 라벨 작성', '수집 항목: 구글 계정(이메일·이름·사진), 훈련 데이터', ['me'], false],
        ],
        policy: [
          ['po-delete', '계정 삭제 경로 제공 (필수)', '앱 내 삭제 기능 — 코드 반영됨', ['code', 'done'], true],
          ['po-42', 'Apple 최소 기능(4.2) 대비', '단순 웹래퍼 거절 위험 — 기록/세션/타이머/프로그레션 등 기능 충분', ['me'], false],
          ['po-privacy-link', '개인정보처리방침 URL 스토어 등록', '', ['me'], false],
        ],
        pay: [
          ['pay-iap', '디지털 구독은 IAP 강제 (수수료 30%)', '네이티브 앱에서 외부 웹결제로 디지털 상품 판매 = 거절', ['pay'], false],
          ['pay-split', '웹=토스/Stripe, 네이티브=IAP 분리 설계', '서버 권한(entitlement) 레이어로 소스 무관 통합', ['pay', 'code'], false],
        ],
      };

      const KEY = 'linkup.store.checklist.v1';
      const tagText = { done: '완료', code: '코드', me: '내가 할 일', pay: '결제' };

      function loadState() {
        try { return JSON.parse(localStorage.getItem(KEY) || '{}'); } catch { return {}; }
      }
      function saveState(s) { try { localStorage.setItem(KEY, JSON.stringify(s)); } catch {} }

      const state = loadState();
      let total = 0;

      Object.entries(DATA).forEach(([sec, rows]) => {
        const ul = document.querySelector('[data-section="' + sec + '"]');
        rows.forEach(([id, label, note, tags, defaultDone]) => {
          total++;
          if (!(id in state)) state[id] = !!defaultDone;
          const li = document.createElement('li');
          li.className = 'item';
          li.id = 'li-' + id;
          const tagsHtml = (tags || [])
            .map((t) => '<span class="tag ' + t + '">' + (tagText[t] || t) + '</span>')
            .join('');
          li.innerHTML =
            '<input type="checkbox" class="cb" ' + (state[id] ? 'checked' : '') + ' />' +
            '<div class="body"><div class="label">' + label + '</div>' +
            (note ? '<div class="note">' + note + '</div>' : '') +
            (tagsHtml ? '<div class="tags">' + tagsHtml + '</div>' : '') +
            '</div>';
          const cb = li.querySelector('.cb');
          cb.addEventListener('change', () => {
            state[id] = cb.checked;
            li.classList.toggle('checked', cb.checked);
            saveState(state);
            refresh();
          });
          li.classList.toggle('checked', state[id]);
          ul.appendChild(li);
        });
      });

      function refresh() {
        const done = Object.values(state).filter(Boolean).length;
        const pct = total ? Math.round((done / total) * 100) : 0;
        document.getElementById('doneN').textContent = done;
        document.getElementById('totalN').textContent = total;
        document.getElementById('pct').textContent = pct + '%';
        document.getElementById('barFill').style.width = pct + '%';
      }

      function resetChecks() {
        Object.keys(state).forEach((k) => (state[k] = false));
        saveState(state);
        document.querySelectorAll('.cb').forEach((cb) => (cb.checked = false));
        document.querySelectorAll('.item').forEach((li) => li.classList.remove('checked'));
        refresh();
      }

      saveState(state);
      refresh();
    </script>
  </body>
</html>
